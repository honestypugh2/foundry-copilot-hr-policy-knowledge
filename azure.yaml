# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: foundry-copilot-hr-policy-knowledge
metadata:
    template: foundry-copilot-hr-policy-knowledge
services:
    backend:
        project: .
        host: containerapp
        language: python
        docker:
            path: src/backend/Dockerfile
            context: .
            remoteBuild: true
    hr-policy-agent:
        project: src/hosted_agent
        host: azure.ai.agent
        language: ""
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
infra:
    provider: bicep
    path: infra
