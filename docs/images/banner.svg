<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ask HR — HR Policy Knowledge Agent banner">
  <defs>
    <!-- Background gradient (Microsoft Foundry style) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1437"/>
      <stop offset="0.45" stop-color="#122A6B"/>
      <stop offset="1" stop-color="#3B1E7A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4FC3F7"/>
      <stop offset="1" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.03"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4FC3F7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4FC3F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7C4DFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7C4DFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Ambient glows -->
  <circle cx="180" cy="120" r="320" fill="url(#glowA)"/>
  <circle cx="1120" cy="560" r="360" fill="url(#glowB)"/>

  <!-- Subtle grid dots -->
  <g fill="#FFFFFF" fill-opacity="0.06">
    <g>
      <circle cx="60" cy="60" r="2"/><circle cx="120" cy="60" r="2"/><circle cx="180" cy="60" r="2"/>
      <circle cx="60" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="180" cy="120" r="2"/>
      <circle cx="60" cy="180" r="2"/><circle cx="120" cy="180" r="2"/><circle cx="180" cy="180" r="2"/>
    </g>
    <g transform="translate(1040,420)">
      <circle cx="0" cy="0" r="2"/><circle cx="60" cy="0" r="2"/><circle cx="120" cy="0" r="2"/>
      <circle cx="0" cy="60" r="2"/><circle cx="60" cy="60" r="2"/><circle cx="120" cy="60" r="2"/>
      <circle cx="0" cy="120" r="2"/><circle cx="60" cy="120" r="2"/><circle cx="120" cy="120" r="2"/>
    </g>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="120" width="72" height="6" rx="3" fill="url(#accentGrad)"/>

  <!-- Eyebrow -->
  <text x="80" y="112" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" letter-spacing="4" font-weight="600" fill="#9FB3E8">MICROSOFT FOUNDRY · MICROSOFT AGENT FRAMEWORK</text>

  <!-- Title -->
  <text x="78" y="210" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="86" font-weight="800" fill="#FFFFFF">Ask HR</text>
  <text x="80" y="270" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="40" font-weight="600" fill="#C9D6F5">HR Policy Knowledge Agent</text>

  <!-- Subtitle -->
  <text x="80" y="322" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#A9BAE6">Grounded answers from internal HR policy documents —</text>
  <text x="80" y="352" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#A9BAE6">Azure AI Search · Foundry Agent Service · Copilot Studio</text>

  <!-- Pattern cards -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <!-- Card A -->
    <g filter="url(#softShadow)">
      <rect x="80" y="410" width="270" height="150" rx="16" fill="url(#cardGrad)" stroke="#4FC3F7" stroke-opacity="0.35"/>
      <circle cx="118" cy="448" r="20" fill="#4FC3F7" fill-opacity="0.18"/>
      <text x="118" y="456" text-anchor="middle" font-size="22" font-weight="800" fill="#4FC3F7">A</text>
      <text x="152" y="446" font-size="21" font-weight="700" fill="#FFFFFF">Direct KB</text>
      <text x="152" y="470" font-size="15" fill="#9FB3E8">Copilot Studio → Search</text>
      <text x="100" y="520" font-size="15" fill="#C9D6F5">Zero-code, ~1–2 s</text>
      <text x="100" y="542" font-size="14" fill="#8FA3D8">Native citations</text>
    </g>

    <!-- Card B -->
    <g filter="url(#softShadow)">
      <rect x="370" y="410" width="270" height="150" rx="16" fill="url(#cardGrad)" stroke="#7C4DFF" stroke-opacity="0.4"/>
      <circle cx="408" cy="448" r="20" fill="#7C4DFF" fill-opacity="0.22"/>
      <text x="408" y="456" text-anchor="middle" font-size="22" font-weight="800" fill="#B39DFF">B</text>
      <text x="442" y="446" font-size="21" font-weight="700" fill="#FFFFFF">Foundry Agent</text>
      <text x="442" y="470" font-size="15" fill="#9FB3E8">PromptAgent + MCPTool</text>
      <text x="390" y="520" font-size="15" fill="#C9D6F5">Force-grounded synthesis</text>
      <text x="390" y="542" font-size="14" fill="#8FA3D8">tool_choice = required</text>
    </g>

    <!-- Card C -->
    <g filter="url(#softShadow)">
      <rect x="660" y="410" width="270" height="150" rx="16" fill="url(#cardGrad)" stroke="#4FC3F7" stroke-opacity="0.35"/>
      <circle cx="698" cy="448" r="20" fill="#4FC3F7" fill-opacity="0.18"/>
      <text x="698" y="456" text-anchor="middle" font-size="22" font-weight="800" fill="#4FC3F7">C</text>
      <text x="732" y="446" font-size="21" font-weight="700" fill="#FFFFFF">Doc Locator</text>
      <text x="732" y="470" font-size="15" fill="#9FB3E8">POST /api/lookup</text>
      <text x="690" y="520" font-size="15" fill="#C9D6F5">Sub-second, no LLM</text>
      <text x="690" y="542" font-size="14" fill="#8FA3D8">Deterministic + auditable</text>
    </g>

    <!-- Card Hosted -->
    <g filter="url(#softShadow)">
      <rect x="950" y="410" width="250" height="150" rx="16" fill="url(#cardGrad)" stroke="#7C4DFF" stroke-opacity="0.4"/>
      <circle cx="988" cy="448" r="20" fill="#7C4DFF" fill-opacity="0.22"/>
      <text x="988" y="454" text-anchor="middle" font-size="16" font-weight="800" fill="#B39DFF">⌘</text>
      <text x="1022" y="446" font-size="21" font-weight="700" fill="#FFFFFF">Hosted Agent</text>
      <text x="1022" y="470" font-size="15" fill="#9FB3E8">Self-hosted runtime</text>
      <text x="970" y="520" font-size="15" fill="#C9D6F5">Agent Framework hosting</text>
      <text x="970" y="542" font-size="14" fill="#8FA3D8">Your container</text>
    </g>
  </g>

  <!-- Decorative agent/knowledge glyph -->
  <g transform="translate(1000,150)" opacity="0.95">
    <circle cx="70" cy="70" r="92" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-opacity="0.6"/>
    <circle cx="70" cy="70" r="60" fill="url(#accentGrad)" fill-opacity="0.12"/>
    <!-- nodes -->
    <circle cx="70" cy="70" r="14" fill="url(#accentGrad)"/>
    <g stroke="#7EC8F2" stroke-width="2" stroke-opacity="0.7">
      <line x1="70" y1="70" x2="18" y2="30"/>
      <line x1="70" y1="70" x2="130" y2="26"/>
      <line x1="70" y1="70" x2="14" y2="110"/>
      <line x1="70" y1="70" x2="126" y2="120"/>
    </g>
    <g fill="#B39DFF">
      <circle cx="18" cy="30" r="7"/>
      <circle cx="130" cy="26" r="7"/>
      <circle cx="14" cy="110" r="7"/>
      <circle cx="126" cy="120" r="7"/>
    </g>
  </g>
</svg>
